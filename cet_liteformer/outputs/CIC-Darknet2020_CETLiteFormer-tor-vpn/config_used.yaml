experiment:
  name: CIC-Darknet2020_CETLiteFormer-tor-vpn
  seed: 42
  output_dir: outputs
data:
  csv_path: ..\Datasets\CIC-Darknet2020\Darknet.CSV
  label_col: Label
  drop_cols: []
  test_size: 0.15
  val_size: 0.15
  stratify: true
  max_rows: null
  missing_strategy: median
  normalize: log_iqr
  remove_constant_features: true
  correlation_selection:
    enabled: true
    method: spearman_ovr
    top_k: 384
    min_abs_corr: 0.0
model:
  name: CET-LiteFormer
  embed_dim: 128
  num_layers: 4
  num_heads: 8
  rff_dim: 64
  sigma: 1.0
  learnable_sigma: true
  attention_type: correntropy_rbf
  dropout: 0.12
  use_cls_token: true
  use_entropy_gate: true
  use_correntropy_attention: true
  use_early_exit: false
  early_exit_threshold: 0.9
  ffn_bottleneck_ratio: 0.67
  gate_prior_strength: 1.0
training:
  epochs: 150
  batch_size: 256
  lr: 0.0008
  weight_decay: 0.00015
  patience: 90
  optimizer: adamw
  scheduler: cosine_warmup
  warmup_epochs: 12
  use_focal_loss: true
  focal_gamma: 1.5
  gate_l1_lambda: 0.0001
  exit_loss_lambda: 0.22
  grad_clip: 1.0
evaluation:
  save_confusion_matrix: true
  save_predictions: true
  measure_latency: true
  latency_batch_size: 1
  latency_warmup: 100
  latency_repeats: 1000
